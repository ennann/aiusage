name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint (typecheck all packages)
        run: pnpm -r lint

      - name: Build
        run: pnpm turbo build

      - name: Test (all packages)
        run: pnpm -r test

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Inject Cloudflare deployment config
        run: |
          if [ -z "$CLOUDFLARE_D1_DATABASE_ID" ]; then
            echo "::error::Missing GitHub secret CLOUDFLARE_D1_DATABASE_ID"
            exit 1
          fi
          node - <<'NODE'
          const fs = require('node:fs');
          const path = 'packages/worker/wrangler.jsonc';
          let config = fs.readFileSync(path, 'utf8');
          if (process.env.CLOUDFLARE_WORKER_NAME) {
            config = config.replace(/"name":\s*"[^"]+"/, `"name": "${process.env.CLOUDFLARE_WORKER_NAME}"`);
          }
          const databaseId = JSON.stringify(process.env.CLOUDFLARE_D1_DATABASE_ID);
          if (/"database_id":\s*"[^"]+"/.test(config)) {
            config = config.replace(/"database_id":\s*"[^"]+"/, `"database_id": ${databaseId}`);
          } else {
            config = config.replace(/("database_name":\s*"[^"]+")/, `$1,\n      "database_id": ${databaseId}`);
          }
          fs.writeFileSync(path, config);
          NODE
        env:
          CLOUDFLARE_WORKER_NAME: ${{ secrets.CLOUDFLARE_WORKER_NAME }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}

      - name: Build Dashboard & Deploy Worker
        run: |
          pnpm --filter @aiusage/dashboard build
          cp -r packages/dashboard/dist packages/worker/public
          cd packages/worker && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  publish:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm turbo build --filter @aiusage/cli

      - name: Publish CLI (if version is new)
        run: |
          LOCAL_VERSION=$(node -p "require('./packages/cli/package.json').version")
          if npm view "@aiusage/cli@${LOCAL_VERSION}" version >/dev/null 2>&1; then
            echo "CLI v${LOCAL_VERSION} already published, skipping"
          else
            NPM_VERSION=$(npm view @aiusage/cli version 2>/dev/null || echo "none")
            echo "Publishing @aiusage/cli@${LOCAL_VERSION} (npm latest is ${NPM_VERSION})"
            cd packages/cli && npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
